<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Unified Monitoring Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 30px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 0px 10px #ccc;
        }

        th, td {
            padding: 14px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #3498db;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .high {
            color: red;
            font-weight: bold;
        }

        .medium {
            color: orange;
            font-weight: bold;
        }

        .low {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Unified Monitoring Dashboard</h1>

<table>
    <thead>
        <tr>
            <th>VM Name</th>
            <th>CPU Usage</th>
            <th>RAM Usage</th>
            <th>Disk Usage</th>
            <th>Priority</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="metric : ${metrics}">
            <td th:text="${metric.vmName}"></td>
            <td th:text="${metric.cpuUsage}"></td>
            <td th:text="${metric.ramUsage}"></td>
            <td th:text="${metric.diskUsage}"></td>
            <td th:text="${metric.priorityStatus}"></td>
        </tr>
    </tbody>
</table>

</body>
</html>
